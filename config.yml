# plume-skills 全局配置
# plume_root 由 install.sh --core 自动写入
plume_root: "/root/plume/plume-skills"

# 本地化设置
locale:
  # 时区：影响时间戳、日报日期边界、cron 触发时间计算
  # cron 命令会自动将此时区的 cron_time 转换为本机时间，无需手动换算
  # 常用时区：
  #   Asia/Shanghai (UTC+8)    Asia/Tokyo (UTC+9)      Asia/Singapore (UTC+8)
  #   America/New_York (UTC-5) America/Los_Angeles (UTC-8) Europe/London (UTC+0)
  timezone: "Asia/Shanghai"
  # 生成文档语言：日报、研究报告、设计文档等人类可阅读文档均使用此语言
  language: "zh-CN"

# 上下文快照管理
context:
  # 数据量上限（MB）：plume-context/ + 关联 jsonl 总大小超过此值时提醒清理
  max_data_size_mb: 500

digest:
  # 日报默认作用域：只检索 ~/.claude/projects/ 中 slug 包含此关键词的项目
  # 目的：隔离工作/个人项目——公司项目统一在同一父目录下即可
  # 留空则每次生成时由用户指定
  default_scope: "plume"

  # 日报自动生成时间（config 时区）
  # install.sh cron 会读取此值，自动转换为本机时区写入 crontab
  cron_time: "06:00"

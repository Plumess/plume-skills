# plume-skills 全局配置
# plume_root 由 install.sh --universal 自动写入
plume_root: "/home/plume/plume-skills"

# 本地化设置
locale:
  # 时区：影响时间戳、日报日期边界、remind_at 判断
  timezone: "Asia/Shanghai"
  # 生成文档语言：日报、研究报告、设计文档等人类可阅读文档均使用此语言
  language: "zh-CN"

# 上下文快照管理
context:
  # 数据量上限（MB）：plume-context/ + 关联 jsonl 总大小超过此值时提醒清理
  max_data_size_mb: 500

digest:
  # 日报默认作用域：只检索 ~/.claude/projects/ 中 slug 包含此关键词的项目
  # 目的：隔离工作/个人项目——公司项目统一在同一父目录下即可
  # 留空则每次生成时由用户指定
  default_scope: "edge-exploration"

  # 自动生成：true 时在 remind_at 时间点自动执行日报生成（无需用户确认）
  # false 时仅提示用户（[DIGEST-HINT]）
  auto_generate: false

  # 提醒时间窗口（±60 分钟内触发）
  # 条件：时间窗口内 + scope 内有当日活跃 jsonl + 当日日报不存在
  remind_at:
    - "09:00"
    - "18:00"
